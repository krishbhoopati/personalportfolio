<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krish - Portfolio</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="h-screen w-full relative flex flex-col selection:bg-yellow-400 selection:text-blue-900">

    <canvas id="c"></canvas>
    <script src="js/loader.js"></script>

    <div id="site-content">

    <!-- Grid background -->
    <div class="absolute inset-0 z-0 bg-grid pointer-events-none"></div>

    <!-- Portrait top right -->
    <img src="my-notion-face-portrait (1).png" alt="Krish portrait" class="absolute top-6 right-6 md:top-8 z-50 w-14 md:w-16 rounded-full object-cover pixel-art spin-cw">

    <!-- Floating pixel flowers -->
    <div id="flowers" class="absolute inset-0 z-0 overflow-hidden pointer-events-none">

        <!-- Smiley - top left -->
        <div class="absolute top-[15%] left-[10%] w-12 h-12 animate-float-medium delay-100 opacity-90">
            <img src="smiley.png" class="w-full h-full drop-shadow-lg pixel-art">
        </div>

        <!-- Flower 2 - top center-left -->
        <div class="absolute top-[8%] left-[25%] w-6 h-6 animate-float-slow delay-500 opacity-80">
            <svg viewBox="0 0 12 16" class="w-full h-full drop-shadow-lg pixel-art">
                <rect x="4" y="0" width="4" height="4" fill="#FFD700"></rect>
                <rect x="4" y="8" width="4" height="4" fill="#FFD700"></rect>
                <rect x="0" y="4" width="4" height="4" fill="#FFD700"></rect>
                <rect x="8" y="4" width="4" height="4" fill="#FFD700"></rect>
                <rect x="4" y="4" width="4" height="4" fill="#8B4513"></rect>
                <rect x="4" y="12" width="4" height="4" fill="#228B22"></rect>
            </svg>
        </div>

        <!-- Rocketship - top right -->
        <div class="absolute top-[20%] right-[15%] w-20 h-20 animate-float-fast delay-300 opacity-85">
            <img src="rocketship.png" class="w-full h-full drop-shadow-lg pixel-art">
        </div>

        <!-- Flower 4 - bottom left -->
        <div class="absolute bottom-[20%] left-[8%] w-7 h-7 animate-float-slow delay-700 opacity-80">
            <svg viewBox="0 0 12 16" class="w-full h-full drop-shadow-lg pixel-art">
                <rect x="4" y="0" width="4" height="4" fill="#FFD700"></rect>
                <rect x="4" y="8" width="4" height="4" fill="#FFD700"></rect>
                <rect x="0" y="4" width="4" height="4" fill="#FFD700"></rect>
                <rect x="8" y="4" width="4" height="4" fill="#FFD700"></rect>
                <rect x="4" y="4" width="4" height="4" fill="#8B4513"></rect>
                <rect x="4" y="12" width="4" height="4" fill="#228B22"></rect>
            </svg>
        </div>

        <!-- Rocketship - bottom right -->
        <div class="absolute bottom-[25%] right-[20%] w-12 h-12 animate-float-medium delay-1000 opacity-90">
            <img src="rocketship.png" class="w-full h-full drop-shadow-lg pixel-art">
        </div>

        <!-- Rocketship - mid left -->
        <div class="absolute top-[40%] left-[10%] w-8 h-8 animate-float-slow opacity-60">
            <img src="rocketship.png" class="w-full h-full drop-shadow-lg pixel-art">
        </div>

        <!-- Flower 7 - mid right -->
        <div class="absolute top-[60%] right-[8%] w-5 h-5 animate-float-slow delay-200 opacity-70">
            <svg viewBox="0 0 12 16" class="w-full h-full drop-shadow-lg pixel-art">
                <rect x="4" y="0" width="4" height="4" fill="#FF3333"></rect>
                <rect x="4" y="8" width="4" height="4" fill="#FF3333"></rect>
                <rect x="0" y="4" width="4" height="4" fill="#FF3333"></rect>
                <rect x="8" y="4" width="4" height="4" fill="#FF3333"></rect>
                <rect x="4" y="4" width="4" height="4" fill="#FFD700"></rect>
                <rect x="4" y="12" width="4" height="4" fill="#228B22"></rect>
            </svg>
        </div>

    </div>

    <!-- Nav -->
    <nav class="absolute left-0 top-0 z-50 flex flex-col px-6 md:px-12 py-6 gap-4">

        <div class="flex flex-col gap-4 text-sm font-bold tracking-wide">
            <a href="#" class="group relative py-1 w-fit">
                <span class="relative z-10 group-hover:text-yellow-300 transition-colors duration-300">BUILD'S</span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-yellow-300 group-hover:w-full transition-all duration-300"></span>
            </a>
            <a href="#" class="group relative py-1 w-fit">
                <span class="relative z-10 group-hover:text-yellow-300 transition-colors duration-300">ABOUT</span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-yellow-300 group-hover:w-full transition-all duration-300"></span>
            </a>
            <a href="#" class="group relative py-1 w-fit">
                <span class="relative z-10 group-hover:text-yellow-300 transition-colors duration-300">RESUME</span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-yellow-300 group-hover:w-full transition-all duration-300"></span>
            </a>
            <a href="#" class="group relative py-1 w-fit">
                <span class="relative z-10 group-hover:text-yellow-300 transition-colors duration-300">BLOG</span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-yellow-300 group-hover:w-full transition-all duration-300"></span>
            </a>
            <a href="#" class="group relative py-1 w-fit">
                <span class="relative z-10 group-hover:text-yellow-300 transition-colors duration-300">PRESS</span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-yellow-300 group-hover:w-full transition-all duration-300"></span>
            </a>
            <a href="#" class="group relative py-1 w-fit">
                <span class="relative z-10 group-hover:text-yellow-300 transition-colors duration-300">CONTACT</span>
                <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-yellow-300 group-hover:w-full transition-all duration-300"></span>
            </a>
        </div>

    </nav>

    <!-- Main hero -->
    <main id="hero-main" class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none" style="transform: translateY(-32px)">
        <div style="pointer-events:auto">

        <div class="relative flex flex-col cursor-default">

            <!-- BUILDER: positioned just above the top of the 'k' letter -->
            <div class="absolute text-xs md:text-sm font-bold tracking-widest opacity-0 animate-[fadeIn_1s_ease-out_1s_forwards]" style="left:0; top: calc(22vw - 15vw - 1.4em);">
                STRATEGY & GROWTH NERD
            </div>

            <h1 class="font-serif-italic text-[15vw] md:text-[16vw] leading-none text-white tracking-tighter flex items-end select-none drop-shadow-2xl">
                <span>kr</span>

                <!-- CN Tower replacing the 'i' -->
                <div class="relative flex flex-col justify-end items-center mx-[0.5vw] w-[6vw] h-[22vw]">
                    <img id="cn-tower-img" src="cn-tower-cropped.png" alt="CN Tower" class="w-full h-full pixel-art" style="object-fit:contain; object-position: bottom;">
                </div>
                <span>sh</span>
            </h1>

            <!-- BASED IN TORONTO: right-aligned to right edge of name -->
            <div class="text-xs md:text-sm font-bold tracking-widest mt-2 opacity-0 animate-[fadeIn_1s_ease-out_1.5s_forwards]" style="align-self:flex-end; display:block;">
                BORN IN TORONTO, BASED IN WATERLOO
            </div>

        </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="absolute bottom-0 left-0 w-full p-6 flex justify-between items-end z-30 text-xs font-bold tracking-wider opacity-60">
        <div class="flex flex-col gap-2">
            <div class="flex flex-col gap-2 mb-2">
                <a href="https://www.instagram.com/_krish556/" target="_blank" rel="noopener" class="hover:text-yellow-300 transition-colors">INSTAGRAM</a>
                <a href="https://www.linkedin.com/in/krish-bhoopati/" target="_blank" rel="noopener" class="hover:text-yellow-300 transition-colors">LINKEDIN</a>
                <a href="https://x.com/krish_bhoopati" target="_blank" rel="noopener" class="hover:text-yellow-300 transition-colors">TWITTER</a>
                <a href="https://github.com/krishbhoopati" target="_blank" rel="noopener" class="hover:text-yellow-300 transition-colors">GITHUB</a>
            </div>
            <span>krish.bhoopati556@gmail.com</span>
        </div>

        <div class="text-right flex flex-col gap-2">
            <span>&copy; 2026 KRISH</span>
            <span>ALL RIGHTS RESERVED</span>
        </div>
    </footer>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
